- type: entity
  abstract: true
  parent: BaseObjective
  id: BaseAntagBountyObjective
  components:
  - type: Objective
    issuer: objective-issuer-nf-pirate
    difficulty: 1
  # - type: RoleRequirement
    # roles:
    # - NFPirateRole

- type: entity
  parent: BaseAntagBountyObjective
  id: EGGAntagStealCargoObjective
  name: Steal cargo.
  description: Steal cargo.
  components:
  - type: Objective
    icon:
      sprite: Structures/Storage/Crates/generic.rsi
      state: icon
  - type: StealCargoObjective


# Bounties (collections of objectives) down here
- type: antagBounty
  collection: Antag
  id: AntagBountyStealCargo
  name: Steal cargo
  description: Steal cargo from another player
  reward: 10000
  objectives:
    - EGGAntagStealCargoObjective
    
